services:
  meshcore-discord-relay:
    build: .
    env_file:
      - .env
    environment:
      CHANNELS_FILE: /data/channels.yaml
      WEBHOOKS_FILE: /data/webhooks.yaml
    volumes:
      - ./channels.yaml:/data/channels.yaml:ro
      - ./webhooks.yaml:/data/webhooks.yaml:ro
    restart: unless-stopped
